<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>U of U Dining Interactive Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<header>
  <div class="brand"><div class="dot"></div><div><h1>U of U Dining Interactive Map</h1><p class="sub">Campus dining locations with editable performance inputs</p></div></div>
</header>
<section class="map-section">
  <div id="map"></div>
  <div class="map-controls">
    <div class="control-group">
      <label for="metricSelect">Map metric</label>
      <select id="metricSelect" title="Choose which number controls the marker display">
        <option value="traffic">Daily traffic</option>
        <option value="monthlyRevenue">Monthly revenue</option>
        <option value="monthlyProfit">Monthly profit</option>
        <option value="satisfaction">Satisfaction</option>
        <option value="profitMargin">Profit margin</option>
      </select>
    </div>
    <div class="control-group">
      <label>Marker display</label>
      <div class="toggle" aria-label="Marker display mode">
        <button id="colorBtn" class="active" type="button" title="Same-sized markers; hotter colors mean higher values">Color intensity</button>
        <button id="sizeBtn" type="button" title="Larger circles mean higher values">Bubble size</button>
      </div>
    </div>
  </div>
  <div id="legend" class="legend"></div>
</section>
<section class="dashboard">
  <div class="filterbar">
    <div class="field search-field"><label>Find a location</label><input id="searchBox" placeholder="Start typing a name or building" autocomplete="off" /><div id="searchSuggestions" class="suggestions"></div></div>
    <div class="field"><label>Show location type</label><div id="typeButtons" class="type-buttons"></div></div>
    <div class="field"><label>Sort list by</label><select id="sortSelect"><option value="name">Name</option><option value="traffic">Daily traffic</option><option value="monthlyRevenue">Monthly revenue</option><option value="monthlyProfit">Monthly profit</option><option value="satisfaction">Satisfaction</option><option value="profitMargin">Profit margin</option></select></div>
    <button id="resetBtn" class="btn" type="button">Reset filters</button>
    <div style="display:flex;gap:8px"><button id="exportBtn" class="btn primary" type="button">Export CSV</button><label class="btn filelabel">Import CSV<input id="csvInput" type="file" accept=".csv" /></label></div>
  </div>
  <div class="kpis">
    <div class="kpi"><span>Shown locations</span><b id="kpiLocations">--</b></div>
    <div class="kpi"><span>Daily traffic</span><b id="kpiTraffic">--</b></div>
    <div class="kpi"><span>Monthly revenue</span><b id="kpiRevenue">--</b></div>
    <div class="kpi"><span>Monthly profit</span><b id="kpiProfit">--</b></div>
  </div>
  <div class="grid">
    <div class="card"><h3>Campus summary</h3><div id="summaryAnalytics" class="wide-kpi"></div><h3 style="margin-top:14px">Location mix</h3><div id="typeBreakdown" class="pillrow"></div></div>
    <div class="card"><h3 id="topTitle">Top locations</h3><div id="topList"></div></div>
    <div class="card" id="selectedCard"><h3>Selected location</h3><p class="muted">Click a marker or row to see full numbers and edit inputs.</p></div>
  </div>
  <div class="card" style="margin-top:14px"><h3>All locations</h3><div id="locationTable" class="smalltable"></div></div>
</section>
<script src="js/app.js"></script>
</body>
</html>
