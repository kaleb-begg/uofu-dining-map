<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>U of U Dining Interactive Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root { --red:#be0000; --dark:#171717; --muted:#6b7280; --line:#e5e7eb; --soft:#f8fafc; --panel:#ffffff; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--dark); background:#f4f4f5; }
  header { padding:14px 22px; background:#fff; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .brand { display:flex; align-items:center; gap:12px; }
  .dot { width:14px; height:14px; background:var(--red); border-radius:50%; box-shadow:0 0 0 6px rgba(190,0,0,.12); }
  h1 { margin:0; font-size:20px; line-height:1.1; }
  .sub { margin:3px 0 0; color:var(--muted); font-size:12px; }
  .map-section { position:relative; height:72vh; min-height:520px; border-bottom:1px solid var(--line); }
  #map { width:100%; height:100%; background:#f8f8f8; }
  .map-controls { position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:500; display:flex; align-items:center; gap:10px; padding:10px; background:rgba(255,255,255,.96); border:1px solid var(--line); border-radius:16px; box-shadow:0 14px 35px rgba(0,0,0,.16); backdrop-filter:blur(10px); }
  .map-controls label { font-size:12px; font-weight:800; color:#374151; }
  select, input { border:1px solid var(--line); border-radius:10px; padding:9px 10px; background:white; font:inherit; }
  .toggle { display:flex; border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; }
  .toggle button { border:0; background:#fff; padding:9px 13px; font-weight:800; cursor:pointer; }
  .toggle button.active { background:var(--red); color:white; }
  .legend { position:absolute; left:16px; bottom:18px; z-index:500; width:270px; background:rgba(255,255,255,.96); border:1px solid var(--line); border-radius:14px; box-shadow:0 10px 28px rgba(0,0,0,.14); padding:12px; font-size:12px; }
  .grad { height:10px; border-radius:999px; margin:8px 0 6px; background:linear-gradient(90deg,#dbeafe,#93c5fd,#fbbf24,#ef4444,#7f1d1d); }
  .dashboard { max-width:1280px; margin:0 auto; padding:18px 22px 26px; }
  .filterbar { display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr auto auto; gap:10px; align-items:end; background:#fff; border:1px solid var(--line); border-radius:18px; padding:14px; box-shadow:0 8px 24px rgba(0,0,0,.05); }
  .field label { display:block; font-size:11px; color:var(--muted); font-weight:800; text-transform:uppercase; letter-spacing:.04em; margin:0 0 5px; }
  .field input, .field select { width:100%; }
  .btn { display:inline-block; border:1px solid var(--line); background:#fff; border-radius:10px; padding:10px 12px; font-weight:800; font-size:12px; cursor:pointer; white-space:nowrap; }
  .btn.primary { background:var(--red); color:#fff; border-color:var(--red); }
  .filelabel { position:relative; overflow:hidden; }
  .filelabel input { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:14px 0; }
  .kpi { background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px; }
  .kpi span { display:block; font-size:11px; color:var(--muted); font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
  .kpi b { display:block; font-size:22px; margin-top:4px; }
  .grid { display:grid; grid-template-columns:1.05fr 1fr .9fr; gap:14px; align-items:start; }
  .card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:15px; }
  .card h2, .card h3 { margin:0 0 10px; font-size:15px; }
  .wide-kpi { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
  .mini { background:var(--soft); border:1px solid var(--line); border-radius:13px; padding:10px; }
  .mini span { display:block; color:var(--muted); font-size:11px; }
  .mini b { font-size:15px; }
  .barrow { padding:9px 0; border-top:1px solid #f0f1f3; cursor:pointer; }
  .barrow:first-child { border-top:0; }
  .barrow:hover { background:#fafafa; }
  .line { display:flex; justify-content:space-between; gap:10px; font-size:12px; }
  .line b { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .line span { color:var(--muted); white-space:nowrap; }
  .track { height:7px; border-radius:999px; background:#edf0f3; overflow:hidden; margin-top:6px; }
  .fill { height:100%; background:var(--red); border-radius:999px; }
  .pillrow { display:flex; flex-wrap:wrap; gap:7px; }
  .pill { border:1px solid var(--line); border-radius:999px; padding:6px 8px; background:var(--soft); font-size:11px; font-weight:800; color:#374151; }
  .smalltable { max-height:360px; overflow:auto; border:1px solid var(--line); border-radius:13px; }
  .tableitem { display:grid; grid-template-columns:1fr auto; gap:8px; padding:9px 10px; border-top:1px solid #f0f1f3; cursor:pointer; font-size:12px; }
  .tableitem:first-child { border-top:0; }
  .tableitem:hover { background:#f8fafc; }
  .tableitem .name { font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tableitem .building { color:var(--muted); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .selected-title { font-size:19px; margin:0 0 2px; font-weight:900; }
  .selected-meta { margin:0 0 12px; color:var(--muted); font-size:12px; }
  .mini-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  details { margin-top:12px; }
  summary { cursor:pointer; font-weight:900; color:#374151; }
  .edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .edit-grid label { display:block; font-size:11px; color:var(--muted); margin-bottom:4px; }
  .edit-grid input { width:100%; padding:7px; font-size:12px; }
  .popup h3 { margin:0; font-size:16px; }
  .popup p { margin:4px 0 10px; color:#6b7280; }
  .popgrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; min-width:220px; }
  .popgrid div { background:#f8fafc; border:1px solid #e5e7eb; border-radius:10px; padding:8px; }
  .popgrid b { font-size:14px; }
  .muted { color:#6b7280; font-size:11px; line-height:1.4; }
  @media (max-width:1050px) { .filterbar { grid-template-columns:1fr 1fr; } .grid { grid-template-columns:1fr; } .kpis { grid-template-columns:1fr 1fr; } .map-controls { left:12px; right:12px; transform:none; flex-wrap:wrap; } }
</style>
</head>
<body>
<header>
  <div class="brand"><div class="dot"></div><div><h1>U of U Dining Interactive Map</h1><p class="sub">Campus dining locations with editable performance inputs</p></div></div>
</header>
<section class="map-section">
  <div id="map"></div>
  <div class="map-controls">
    <label for="metricSelect">Show</label>
    <select id="metricSelect">
      <option value="traffic">Traffic</option>
      <option value="monthlyRevenue">Revenue</option>
      <option value="monthlyProfit">Profit</option>
      <option value="satisfaction">Satisfaction</option>
      <option value="profitMargin">Profit margin</option>
    </select>
    <div class="toggle" aria-label="Display mode">
      <button id="colorBtn" class="active" type="button">Color</button>
      <button id="sizeBtn" type="button">Size</button>
    </div>
  </div>
  <div id="legend" class="legend"></div>
</section>
<section class="dashboard">
  <div class="filterbar">
    <div class="field"><label>Search</label><input id="searchBox" placeholder="Search location or building" /></div>
    <div class="field"><label>Type</label><select id="typeFilter"><option value="all">All types</option></select></div>
    <div class="field"><label>Sort list by</label><select id="sortSelect"><option value="name">Name</option><option value="traffic">Traffic</option><option value="monthlyRevenue">Revenue</option><option value="monthlyProfit">Profit</option><option value="satisfaction">Satisfaction</option><option value="profitMargin">Profit margin</option></select></div>
    <div class="field"><label>Minimum traffic/day</label><input id="minTraffic" type="number" min="0" step="10" placeholder="0" /></div>
    <button id="resetBtn" class="btn" type="button">Reset filters</button>
    <div style="display:flex;gap:8px"><button id="exportBtn" class="btn primary" type="button">Export CSV</button><label class="btn filelabel">Import CSV<input id="csvInput" type="file" accept=".csv" /></label></div>
  </div>
  <div class="kpis">
    <div class="kpi"><span>Shown locations</span><b id="kpiLocations">--</b></div>
    <div class="kpi"><span>Daily traffic</span><b id="kpiTraffic">--</b></div>
    <div class="kpi"><span>Monthly revenue</span><b id="kpiRevenue">--</b></div>
    <div class="kpi"><span>Monthly profit</span><b id="kpiProfit">--</b></div>
  </div>
  <div class="grid">
    <div class="card"><h3>Campus summary</h3><div id="summaryAnalytics" class="wide-kpi"></div><h3 style="margin-top:14px">Location mix</h3><div id="typeBreakdown" class="pillrow"></div></div>
    <div class="card"><h3 id="topTitle">Top locations</h3><div id="topList"></div></div>
    <div class="card" id="selectedCard"><h3>Selected location</h3><p class="muted">Click a marker or row to see full numbers and edit inputs.</p></div>
  </div>
  <div class="card" style="margin-top:14px"><h3>All locations</h3><div id="locationTable" class="smalltable"></div></div>
</section>

let locations = initialLocations.map((d, i) => recalc({...d, id: `${d.name}__${d.building}__${i}` }));
let activeMetric = 'traffic';
let displayMode = 'color';
let selectedId = null;
let markers = [];
const metricMeta = {
  traffic: {label:'Traffic', unit:' daily visits', money:false},
  monthlyRevenue: {label:'Revenue', unit:'', money:true},
  monthlyProfit: {label:'Profit', unit:'', money:true},
  satisfaction: {label:'Satisfaction', unit:'/5', money:false},
  profitMargin: {label:'Profit margin', unit:'%', money:false}
};
const map = L.map('map', { zoomControl:true, preferCanvas:true }).setView([40.7648, -111.8427], 16);
L.tileLayer('https://fmagsdr.fm.utah.edu/arcgis/rest/services/mapservices/public_basemap_2014/MapServer/tile/{z}/{y}/{x}', {
  maxZoom:20,
  attribution:'Map tiles: University of Utah Facilities GIS'
}).addTo(map);
function fitCampus() {
  const valid = locations.filter(d => Number.isFinite(d.lat) && Number.isFinite(d.lng));
  if (valid.length) map.fitBounds(L.latLngBounds(valid.map(d => [d.lat, d.lng])).pad(0.18));
}
function cleanNumber(v) {
  if (typeof v === 'number') return Number.isFinite(v) ? v : 0;
  const n = Number(String(v ?? '').replace(/[,$%]/g,'').trim());
  return Number.isFinite(n) ? n : 0;
}
function recalc(d) {
  d.lat = cleanNumber(d.lat); d.lng = cleanNumber(d.lng); d.traffic = cleanNumber(d.traffic); d.avgTicket = cleanNumber(d.avgTicket); d.expenses = cleanNumber(d.expenses); d.satisfaction = cleanNumber(d.satisfaction);
  d.monthlyRevenue = d.traffic * d.avgTicket * 30;
  d.monthlyProfit = d.monthlyRevenue - d.expenses;
  d.profitMargin = d.monthlyRevenue ? d.monthlyProfit / d.monthlyRevenue : 0;
  return d;
}
function filteredLocations() {
  const search = document.getElementById('searchBox').value.trim().toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const minTraffic = cleanNumber(document.getElementById('minTraffic').value);
  return locations.filter(d =>
    (!search || (d.name+' '+d.building+' '+d.type).toLowerCase().includes(search)) &&
    (type === 'all' || d.type === type) &&
    (!minTraffic || d.traffic >= minTraffic)
  );
}
function extent(metric=activeMetric, rows=filteredLocations()) {
  const vals = rows.map(d => valueFor(d, metric)).filter(v => Number.isFinite(v));
  if (!vals.length) return {min:0,max:1};
  return {min: Math.min(...vals), max: Math.max(...vals)};
}
function normalize(v, metric=activeMetric, rows=filteredLocations()) {
  const e = extent(metric, rows); const span = e.max - e.min;
  return span ? (v - e.min) / span : .55;
}
function valueFor(d, metric=activeMetric) { return cleanNumber(d[metric]); }
function fmt(v, metric=activeMetric) {
  if (metricMeta[metric]?.money) return '$' + Math.round(v).toLocaleString();
  if (metric === 'profitMargin') return (v*100).toFixed(1)+'%';
  if (metric === 'satisfaction') return Number(v).toFixed(1) + '/5';
  return Math.round(v).toLocaleString();
}
function colorFor(n) {
  if (n < .2) return '#dbeafe';
  if (n < .4) return '#93c5fd';
  if (n < .6) return '#fbbf24';
  if (n < .8) return '#ef4444';
  return '#7f1d1d';
}
function markerRadius(d, rows) { return 4 + normalize(valueFor(d), activeMetric, rows) * 7; }
function colorRadius() { return 7; }
function escapeHtml(s) { return String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function escapeAttr(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
function popupHtml(d) {
  return `<div class="popup"><h3>${escapeHtml(d.name)}</h3><p>${escapeHtml(d.building)} · ${escapeHtml(d.type)}</p>
  <div class="popgrid">
    <div><b>${Math.round(d.traffic).toLocaleString()}</b><br><span class="muted">daily traffic</span></div>
    <div><b>${fmt(d.monthlyRevenue,'monthlyRevenue')}</b><br><span class="muted">monthly revenue</span></div>
    <div><b>${fmt(d.monthlyProfit,'monthlyProfit')}</b><br><span class="muted">monthly profit</span></div>
    <div><b>${Number(d.satisfaction).toFixed(1)}/5</b><br><span class="muted">satisfaction</span></div>
  </div></div>`;
}
function draw() {
  locations.forEach(recalc);
  const rows = filteredLocations();
  markers.forEach(m => map.removeLayer(m)); markers = [];
  locations.forEach(d => {
    if (!rows.includes(d)) return markers.push(null);
    const n = normalize(valueFor(d), activeMetric, rows);
    const radius = displayMode === 'size' ? markerRadius(d, rows) : colorRadius();
    const m = L.circleMarker([d.lat, d.lng], {
      radius,
      color:'#fff',
      weight:2,
      fillColor:colorFor(n),
      fillOpacity: displayMode === 'color' ? 0.9 : 0.78
    }).bindPopup(popupHtml(d)).on('click', () => selectLocation(d.id)).addTo(map);
    markers.push(m);
  });
  updatePanel(rows); updateLegend(rows);
}
function updateLegend(rows=filteredLocations()) {
  const meta = metricMeta[activeMetric];
  const e = extent(activeMetric, rows);
  document.getElementById('legend').innerHTML = `<b>${meta.label} shown by ${displayMode === 'color' ? 'circle color' : 'circle size'}</b><div class="grad"></div><div style="display:flex;justify-content:space-between"><span>${fmt(e.min, activeMetric)}</span><span>${fmt(e.max, activeMetric)}</span></div>`;
}
function updatePanel(rows=filteredLocations()) {
  const totalTraffic = rows.reduce((s,d)=>s+d.traffic,0);
  const totalRevenue = rows.reduce((s,d)=>s+d.monthlyRevenue,0);
  const totalProfit = rows.reduce((s,d)=>s+d.monthlyProfit,0);
  document.getElementById('kpiLocations').textContent = rows.length;
  document.getElementById('kpiTraffic').textContent = Math.round(totalTraffic).toLocaleString();
  document.getElementById('kpiRevenue').textContent = fmt(totalRevenue,'monthlyRevenue');
  document.getElementById('kpiProfit').textContent = fmt(totalProfit,'monthlyProfit');
  const avgTicket = totalTraffic ? totalRevenue / (totalTraffic * 30) : 0;
  const avgSat = rows.length ? rows.reduce((s,d)=>s+d.satisfaction,0)/rows.length : 0;
  const margin = totalRevenue ? totalProfit/totalRevenue : 0;
  const totalExpenses = rows.reduce((s,d)=>s+d.expenses,0);
  document.getElementById('summaryAnalytics').innerHTML = `
    <div class="mini"><span>Avg ticket</span><b>$${avgTicket.toFixed(2)}</b></div>
    <div class="mini"><span>Avg satisfaction</span><b>${avgSat.toFixed(1)}/5</b></div>
    <div class="mini"><span>Profit margin</span><b>${(margin*100).toFixed(1)}%</b></div>
    <div class="mini"><span>Monthly expenses</span><b>${fmt(totalExpenses,'monthlyRevenue')}</b></div>
    <div class="mini"><span>Avg traffic/location</span><b>${rows.length ? Math.round(totalTraffic/rows.length).toLocaleString() : '0'}</b></div>
    <div class="mini"><span>Selected metric</span><b>${metricMeta[activeMetric].label}</b></div>`;
  const typeCounts = {};
  rows.forEach(d => typeCounts[d.type] = (typeCounts[d.type] || 0) + 1);
  document.getElementById('typeBreakdown').innerHTML = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).map(([type,count]) => `<span class="pill">${escapeHtml(type)} · ${count}</span>`).join('') || '<span class="muted">No matching locations.</span>';
  const sorted = [...rows].sort((a,b)=>valueFor(b)-valueFor(a)).slice(0,7);
  const max = Math.max(...sorted.map(d=>valueFor(d)),1);
  document.getElementById('topTitle').textContent = `Top by ${metricMeta[activeMetric].label.toLowerCase()}`;
  document.getElementById('topList').innerHTML = sorted.map(d => `<div class="barrow" onclick="focusLocation('${escapeAttr(d.id)}')"><div class="line"><b>${escapeHtml(d.name)}</b><span>${fmt(valueFor(d), activeMetric)}</span></div><div class="track"><div class="fill" style="width:${Math.max(5, valueFor(d)/max*100)}%"></div></div></div>`).join('') || '<p class="muted">No matching locations.</p>';
  const sort = document.getElementById('sortSelect').value;
  const listRows = [...rows].sort((a,b) => sort === 'name' ? a.name.localeCompare(b.name) : valueFor(b, sort)-valueFor(a, sort));
  document.getElementById('locationTable').innerHTML = listRows.map(d => `<div class="tableitem" onclick="focusLocation('${escapeAttr(d.id)}')"><div><div class="name">${escapeHtml(d.name)}</div><div class="building">${escapeHtml(d.building)}</div></div><b>${fmt(valueFor(d, sort), sort)}</b></div>`).join('') || '<p class="muted" style="padding:12px">No matching locations.</p>';
  renderSelected(locations.find(d=>d.id===selectedId));
}
function selectLocation(id) { selectedId = id; updatePanel(); }
function focusLocation(id) {
  const d = locations.find(x=>x.id===id); if (!d) return;
  selectedId = id; map.setView([d.lat,d.lng], 18);
  const idx = locations.findIndex(x=>x.id===id);
  if (markers[idx]) markers[idx].openPopup();
  updatePanel();
  document.getElementById('selectedCard').scrollIntoView({behavior:'smooth', block:'center'});
}
window.focusLocation = focusLocation;
function renderSelected(d) {
  const el = document.getElementById('selectedCard');
  if (!d) { el.innerHTML = '<h3>Selected location</h3><p class="muted">Click a marker or row to see full numbers and edit inputs.</p>'; return; }
  el.innerHTML = `<p class="selected-title">${escapeHtml(d.name)}</p><p class="selected-meta">${escapeHtml(d.building)} · ${escapeHtml(d.type)}</p>
  <div class="mini-grid">
    <div class="mini"><span>Traffic/day</span><b>${Math.round(d.traffic).toLocaleString()}</b></div>
    <div class="mini"><span>Avg ticket</span><b>$${Number(d.avgTicket).toFixed(2)}</b></div>
    <div class="mini"><span>Revenue</span><b>${fmt(d.monthlyRevenue,'monthlyRevenue')}</b></div>
    <div class="mini"><span>Expenses</span><b>${fmt(d.expenses,'monthlyRevenue')}</b></div>
    <div class="mini"><span>Profit</span><b>${fmt(d.monthlyProfit,'monthlyProfit')}</b></div>
    <div class="mini"><span>Margin</span><b>${(d.profitMargin*100).toFixed(1)}%</b></div>
    <div class="mini"><span>Satisfaction</span><b>${d.satisfaction.toFixed(1)}/5</b></div>
    <div class="mini"><span>Coordinates</span><b>${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}</b></div>
  </div>
  <details><summary>Edit inputs</summary><div class="edit-grid">
    ${editInput('traffic','Daily traffic',d.traffic)}${editInput('avgTicket','Avg ticket',d.avgTicket)}${editInput('expenses','Monthly expenses',d.expenses)}${editInput('satisfaction','Satisfaction',d.satisfaction)}${editInput('lat','Latitude',d.lat)}${editInput('lng','Longitude',d.lng)}
  </div><button class="btn" onclick="applyEdits('${escapeAttr(d.id)}')">Apply updates</button></details>`;
}
function editInput(key,label,value) { return `<div><label>${label}</label><input id="edit_${key}" value="${value}" /></div>`; }
function applyEdits(id) {
  const d = locations.find(x=>x.id===id); if(!d) return;
  ['traffic','avgTicket','expenses','satisfaction','lat','lng'].forEach(k => d[k] = cleanNumber(document.getElementById('edit_'+k).value));
  recalc(d); selectedId=id; draw();
}
window.applyEdits = applyEdits;
function populateTypeFilter() {
  const sel = document.getElementById('typeFilter');
  const cur = sel.value || 'all';
  sel.innerHTML = '<option value="all">All types</option>' + [...new Set(locations.map(d=>d.type))].sort().map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  sel.value = [...sel.options].some(o=>o.value===cur) ? cur : 'all';
}
document.getElementById('metricSelect').addEventListener('change', e => { activeMetric=e.target.value; draw(); });
document.getElementById('colorBtn').addEventListener('click', () => { displayMode='color'; document.getElementById('colorBtn').classList.add('active'); document.getElementById('sizeBtn').classList.remove('active'); draw(); });
document.getElementById('sizeBtn').addEventListener('click', () => { displayMode='size'; document.getElementById('sizeBtn').classList.add('active'); document.getElementById('colorBtn').classList.remove('active'); draw(); });
['searchBox','typeFilter','sortSelect','minTraffic'].forEach(id => document.getElementById(id).addEventListener('input', draw));
document.getElementById('resetBtn').addEventListener('click', () => { document.getElementById('searchBox').value=''; document.getElementById('typeFilter').value='all'; document.getElementById('sortSelect').value='name'; document.getElementById('minTraffic').value=''; draw(); });
document.getElementById('exportBtn').addEventListener('click', () => {
  const headers = ['name','building','type','lat','lng','traffic','avgTicket','expenses','satisfaction','monthlyRevenue','monthlyProfit','profitMargin'];
  const csv = [headers.join(',')].concat(locations.map(d => headers.map(h => csvCell(d[h])).join(','))).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href=url; a.download='dining_data.csv'; a.click(); URL.revokeObjectURL(url);
});
function csvCell(v) { const s = String(v ?? ''); return /[",\n\r]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
document.getElementById('csvInput').addEventListener('change', e => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const parsed = parseCSV(reader.result);
    if (!parsed.length) return alert('No rows found in CSV.');
    locations = parsed.map((d,i) => recalc({
      name:d.name, building:d.building, type:d.type, lat:d.lat, lng:d.lng,
      traffic:d.traffic, avgTicket:d.avgTicket, expenses:d.expenses, satisfaction:d.satisfaction,
      id:`${d.name}__${d.building}__${i}`
    }));
    selectedId=null; populateTypeFilter(); fitCampus(); draw();
  };
  reader.readAsText(file);
});
function parseCSV(text) {
  const rows=[]; let row=[]; let cell=''; let q=false;
  for (let i=0;i<text.length;i++) {
    const c=text[i], n=text[i+1];
    if (q) {
      if (c==='"' && n==='"') { cell+='"'; i++; }
      else if (c==='"') q=false;
      else cell+=c;
    } else {
      if (c==='"') q=true;
      else if (c===',') { row.push(cell); cell=''; }
      else if (c==='\n') { row.push(cell); rows.push(row); row=[]; cell=''; }
      else if (c !== '\r') cell+=c;
    }
  }
  row.push(cell); rows.push(row);
  const head = rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.length>1 && r.some(x=>String(x).trim())).map(r=>Object.fromEntries(head.map((h,i)=>[h,(r[i]||'').trim()])));
}
populateTypeFilter(); fitCampus(); draw();
